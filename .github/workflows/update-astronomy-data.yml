name: Update astronomy data
on:
  workflow_dispatch:
  schedule:
    - cron: '23 8 * * 1'
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/update-astronomy-data.mjs
      - name: Commit refreshed catalogs
        run: |
          if git diff --quiet -- public/data; then
            echo "No catalog changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          git commit -m "data: refresh astronomy catalogs"
          git push
