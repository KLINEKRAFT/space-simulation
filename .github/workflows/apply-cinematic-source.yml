name: Apply cinematic source

on:
  push:
    branches: [feat/cinematic-planet-pass]
    paths:
      - ".cinematic-source/**"
      - ".github/workflows/apply-cinematic-source.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/cinematic-planet-pass
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Restore validated source
        run: |
          cat .cinematic-source/part-* > /tmp/cinematic.tar.gz.b64
          base64 -d /tmp/cinematic.tar.gz.b64 > /tmp/cinematic.tar.gz
          tar -xzf /tmp/cinematic.tar.gz
      - name: Validate
        run: |
          npm install
          npm run check
      - name: Publish clean source
        run: |
          rm -rf .cinematic-source
          rm -f .github/workflows/apply-cinematic-source.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add cinematic planet rendering and collapsible HUD"
          git push origin HEAD:feat/cinematic-planet-pass
